<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Streamer - StudySync</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { background: #2a2a2a; padding: 20px; border-radius: 15px; max-width: 600px; margin: auto; }
        video { width: 100%; border: 2px solid #444; border-radius: 10px; margin-top: 15px; background: #000; }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 80%; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { color: #ffc107; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Közvetítés Indítása</h1>
        <input type="text" id="my-id" placeholder="Írd be az ID-t (pl. matek01)">
        <br>
        <button onclick="startBroadcasting()">Adás Indítása</button>
        <p id="status">Állapot: Készenlét</p>
        <video id="preview" autoplay muted playsinline></video>
    </div>

    <script>
        let localStream;
        // Fontos: Google STUN szerverek, hogy lássák egymást a neten keresztül
        const peerConfig = {
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
        };

        async function startBroadcasting() {
            const id = document.getElementById('my-id').value;
            if (!id) return alert("Adj meg egy ID-t!");

            try {
                // 1. Képernyőfelvétel kérése
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                document.getElementById('preview').srcObject = localStream;

                // 2. Peer létrehozása az ID-val
                const peer = new Peer(id, peerConfig);

                peer.on('open', (registeredId) => {
                    document.getElementById('status').innerText = "ÉLŐBEN - ID: " + registeredId;
                    document.getElementById('status').style.color = "#28a745";
                });

                // 3. Ha valaki hív, küldjük a képet
                peer.on('call', (call) => {
                    call.answer(localStream);
                });

                peer.on('error', (err) => {
                    alert("Hiba: " + err.type);
                });

            } catch (err) {
                alert("Hiba: Engedélyezned kell a képernyőmegosztást!");
            }
        }
    </script>
</body>
</html>
