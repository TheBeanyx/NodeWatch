<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Streamer Panel</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .box { background: #2a2a2a; padding: 20px; border-radius: 15px; display: inline-block; width: 90%; max-width: 600px; }
        .live-tag { background: red; color: white; padding: 5px 10px; border-radius: 5px; display: none; font-weight: bold; margin-bottom: 10px; }
        video { width: 100%; border: 2px solid #444; border-radius: 10px; margin-top: 10px; background: #000; }
        input, button { padding: 12px; margin: 5px; border-radius: 8px; border: none; font-size: 16px; }
        button { cursor: pointer; background: #28a745; color: white; font-weight: bold; }
        #status-text { color: #ffc107; margin: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <div id="live-indicator" class="live-tag">ÉLŐ ADÁS</div>
        <h2>Streamer Vezérlő</h2>
        <input type="text" id="my-id" placeholder="ID regisztrálása (pl. vizsga1)">
        <button onclick="initStreamer()">ID Regisztrálása & Indítás</button>
        <div id="status-text">Adj meg egy ID-t és kattints az indításra!</div>
        <video id="preview" autoplay muted playsinline></video>
    </div>

    <script>
        let peer = null;
        let localStream = null;

        async function initStreamer() {
            const customId = document.getElementById('my-id').value;
            if (!customId) return alert("Írj be egy ID-t!");

            try {
                // 1. Először kérjük le a képernyőt
                localStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: { ideal: 15, max: 30 } }, // Optimalizált sávszélesség
                    audio: false
                });

                document.getElementById('preview').srcObject = localStream;

                // 2. Kapcsolódás a Peer hálózathoz a megadott ID-val
                peer = new Peer(customId);

                peer.on('open', (id) => {
                    document.getElementById('status-text').innerText = "Készen állsz! A nézők ezzel az ID-val láthatnak: " + id;
                    document.getElementById('live-indicator').style.display = "inline-block";
                    document.getElementById('my-id').disabled = true;
                });

                // 3. Hívások automatikus fogadása
                peer.on('call', (call) => {
                    console.log("Bejövő néző...");
                    call.answer(localStream); // Azonnal küldjük a képernyő képét
                });

                peer.on('error', (err) => {
                    alert("Hiba: " + (err.type === 'unavailable-id' ? "Ez az ID már foglalt!" : err.type));
                });

            } catch (err) {
                console.error("Nem sikerült a megosztás:", err);
                alert("Hiba: Engedélyezned kell a képernyőmegosztást!");
            }
        }
    </script>
</body>
</html>
