<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Watcher - StudySync</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; text-align: center; }
        .header { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; }
        video { width: 100vw; height: calc(100vh - 80px); background: black; object-fit: contain; }
        input { padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <input type="text" id="target-id" placeholder="Diák ID-ja...">
        <button onclick="connect()">Csatlakozás</button>
        <span id="status" style="margin-left: 10px;">Várakozás...</span>
    </div>

    <video id="remote-video" autoplay muted playsinline></video>

    <script>
        const peerConfig = {
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }, { url: 'stun:stun1.l.google.com:19302' }] }
        };
        const peer = new Peer(peerConfig);

        function connect() {
            const targetId = document.getElementById('target-id').value;
            if (!targetId) return;

            document.getElementById('status').innerText = "Kapcsolódás...";

            // Hívás indítása egy üres stream-el
            const call = peer.call(targetId, new MediaStream());

            call.on('stream', (remoteStream) => {
                document.getElementById('status').innerText = "ÉLŐ ADÁS";
                document.getElementById('status').style.color = "#28a745";
                
                const video = document.getElementById('remote-video');
                video.srcObject = remoteStream;
                
                // Kézi indítás, ha az autoplay elakadna
                video.play().catch(e => {
                    document.getElementById('status').innerText = "Kattints a képre a lejátszáshoz!";
                });
            });

            call.on('error', (err) => {
                alert("Hiba: Nem található ilyen ID vagy hálózati hiba.");
            });
        }
    </script>
</body>
</html>
